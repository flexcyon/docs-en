baseURL = 'https://flexcyon.github.io/docs-en/'
locale = 'en-gb'
title = 'Flexcyon Documentation'
defaultContentLanguage = "en"

[module.imports]
path = "github.com/imfing/hextra"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 1

  [languages.zh]
    languageName = "简体中文"
    contentDir = "content/zh"
    weight = 2
